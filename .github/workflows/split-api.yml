name: Split Clan API

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch API and split
        run: |
          mkdir -p members

          curl -s "https://roboninon.win/api/v1/priconne/clan/489663?key=yEmk6fTXsyr4GOjEMwTM15Jt" > data.json

          node << 'EOF'
          const fs = require('fs');

          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));

          console.log("Members found:", data.length);

          data.forEach((member, index) => {
            fs.writeFileSync(
              `members/member_${index + 1}.json`,
              JSON.stringify(member, null, 2)
            );
          });

          console.log("Split complete:", data.length, "members");
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add members

          git commit -m "Update member JSON files" || echo "No changes"

          git push
