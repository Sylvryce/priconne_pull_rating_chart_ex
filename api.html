<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Viewer</title>
</head>
<body>

<pre id="output">Loading...</pre>

<script>
const params = new URLSearchParams(window.location.search);
const memberIndex = parseInt(params.get("member")) || 1;

// Convert to 2-digit format (01, 02, etc.)
const memberId = String(memberIndex).padStart(2, '0');

// Build file path
const fileURL = `members/member_${memberId}.json`;

async function loadData() {
  try {
    console.log("Loading:", fileURL);

    const response = await fetch(fileURL);

    if (!response.ok) {
      throw new Error("File not found");
    }

    const data = await response.json();

    console.log("Member data:", data);

    const output = document.getElementById("output");

    if (!output) return;

    // Display raw JSON only
    output.textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    console.error(err);

    const output = document.getElementById("output");

    if (output) {
      output.textContent = "Error loading member data";
    }
  }
}

loadData();
</script>

</body>
</html>
