<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid App</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  .container {
    display: flex;
    gap: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    flex: 3;
  }

  .box {
    border: 2px solid #ccc;
    padding: 10px;
    height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background-color: #f9f9f9;
    cursor: pointer;
  }

  .box.selected {
    border-color: blue;
    background-color: #e6f0ff;
  }

  .name {
    font-weight: bold;
  }

  .tags1 {
    font-size: 12px;
    color: #555;
  }

  .tags2 {
    font-size: 12px;
    color: #999;
  }

  .panel {
    flex: 1;
    border-left: 2px solid #ccc;
    padding-left: 15px;
  }

  .panel-section {
    margin-bottom: 20px;
  }

  .option {
    padding: 5px;
    border: 1px solid #ccc;
    margin-bottom: 5px;
    cursor: pointer;
    background-color: #f0f0f0;
  }

  .option:hover {
    background-color: #ddd;
  }

  #saveBtn {
    padding: 10px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">

  <div class="grid" id="grid"></div>

  <div class="panel">

    <button id="saveBtn">💾 Save</button>

    <div class="panel-section">
      <h3>Workers (Multi-select)</h3>
      <div class="option worker">Alice</div>
      <div class="option worker">Bob</div>
      <div class="option worker">Charlie</div>
    </div>

    <div class="panel-section">
      <h3>Task (Single)</h3>
      <div class="option task">Task A</div>
      <div class="option task">Task B</div>
      <div class="option task">Task C</div>
    </div>

  </div>

</div>

<script>
const grid = document.getElementById("grid");
let selectedBox = null;

/* CREATE GRID */
for (let i = 1; i <= 30; i++) {
  const box = document.createElement("div");
  box.className = "box";

  box.innerHTML = `
    <div class="name">Member ${i}</div>
    <div class="tags1"></div>
    <div class="tags2">Unassigned</div>
  `;

  box.addEventListener("click", () => {
    if (selectedBox) selectedBox.classList.remove("selected");
    selectedBox = box;
    box.classList.add("selected");
  });

  grid.appendChild(box);
}

/* WORKERS */
document.querySelectorAll(".worker").forEach(option => {
  option.addEventListener("click", () => {
    if (!selectedBox) return;

    const tagsDiv = selectedBox.querySelector(".tags1");
    const name = option.textContent;

    let current = tagsDiv.textContent.split(", ").filter(t => t);

    if (current.includes(name)) {
      current = current.filter(t => t !== name);
    } else {
      current.push(name);
    }

    tagsDiv.textContent = current.join(", ");
    saveToGitHub();
  });
});

/* TASK */
document.querySelectorAll(".task").forEach(option => {
  option.addEventListener("click", () => {
    if (!selectedBox) return;

    const taskDiv = selectedBox.querySelector(".tags2");
    const newTask = option.textContent;

    if (taskDiv.textContent === newTask) {
      taskDiv.textContent = "Unassigned";
    } else {
      taskDiv.textContent = newTask;
    }

    saveToGitHub();
  });
});

/* LOAD FROM GITHUB */
async function loadSharedData() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/Sylvryce/priconne_pull_rating_chart_ex/refs/heads/main/grid-app/data.json");
    const data = await res.json();

    const boxes = document.querySelectorAll(".box");

    data.forEach((item, i) => {
      if (!boxes[i]) return;

      boxes[i].querySelector(".name").textContent = item.name;
      boxes[i].querySelector(".tags1").textContent = item.workers;
      boxes[i].querySelector(".tags2").textContent = item.task;
    });

  } catch (err) {
    console.error(err);
  }
}

/* SAVE TO GITHUB */
async function saveToGitHub() {
  const token = "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"; // 🔴 REPLACE THIS

  const owner = "Sylvryce";
  const repo = "priconne_pull_rating_chart_ex";
  const path = "grid-app/data.json";

  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

  const boxes = document.querySelectorAll(".box");

  const data = Array.from(boxes).map(box => ({
    name: box.querySelector(".name").textContent,
    workers: box.querySelector(".tags1").textContent,
    task: box.querySelector(".tags2").textContent
  }));

  const getRes = await fetch(apiUrl, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const getData = await getRes.json();
  const sha = getData.sha;

  await fetch(apiUrl, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "Update grid data",
      content: btoa(JSON.stringify(data, null, 2)),
      sha: sha
    })
  });

  console.log("Saved!");
}

/* SAVE BUTTON */
document.getElementById("saveBtn").addEventListener("click", saveToGitHub);

/* INIT */
loadSharedData();
</script>

</body>
</html>
