<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Layout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      max-width: 900px;
    }

    .box {
      border: 1px solid #ccc;
      padding: 10px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #f9f9f9;
    }

    .name {
      font-weight: bold;
    }

    .tags1 {
      font-size: 12px;
      color: #555;
    }

    .tags2 {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<h2>6 x 5 Grid</h2>

<div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById("grid");

  for (let i = 1; i <= 30; i++) {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <div class="name">Member ${i}</div>
      <div class="tags1">Tag group 1</div>
      <div class="tags2">Tag group 2</div>
    `;

    grid.appendChild(box);
  }
</script>

</body>
</html>
