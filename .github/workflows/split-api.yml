name: Split Clan API

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch API and split
        run: |
          mkdir -p members
          curl -s "https://roboninon.win/api/v1/priconne/clan/489663?key=yEmk6fTXsyr4GOjEMwTM15Jt" > data.json
          echo "=== RAW DATA PREVIEW ==="
          head -c 500 data.json
          node crawl.js
          node << 'EOF'
          const fs = require('fs');
          const raw = fs.readFileSync('data.json', 'utf8');
          if (!raw || raw.length < 10) {
            console.log("ERROR: Empty API response");
            process.exit(1);
          }
          const data = JSON.parse(raw);
          console.log("Members found:", data.length);

          data.forEach((member, index) => {
            const filename = `members/member_${String(index + 1).padStart(2, '0')}.json`;

            fs.writeFileSync(
              filename,
              JSON.stringify(member) // ✅ minified JSON
            );
          });

          console.log("Split complete:", data.length, "members");
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add members

          git commit -m "Update member JSON files" || echo "No changes"

          git push
