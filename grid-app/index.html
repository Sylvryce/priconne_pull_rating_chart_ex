<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      flex: 3;
    }

    .box {
      border: 2px solid #ccc;
      padding: 10px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #f9f9f9;
      cursor: pointer;
    }

    .box.selected {
      border-color: blue;
      background-color: #e6f0ff;
    }

    .name {
      font-weight: bold;
    }

    .tags1 {
      font-size: 12px;
      color: #555;
    }

    .tags2 {
      font-size: 12px;
      color: #999;
    }

    .panel {
      flex: 1;
      border-left: 2px solid #ccc;
      padding-left: 15px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .option {
      padding: 5px;
      border: 1px solid #ccc;
      margin-bottom: 5px;
      cursor: pointer;
      background-color: #f0f0f0;
    }

    .option:hover {
      background-color: #ddd;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="grid" id="grid"></div>

  <div class="panel">
    <div class="panel-section">
      <h3>Workers</h3>
      <div class="option worker">Alice</div>
      <div class="option worker">Bob</div>
      <div class="option worker">Charlie</div>
    </div>

    <div class="panel-section">
      <h3>Task</h3>
      <div class="option task">Task A</div>
      <div class="option task">Task B</div>
      <div class="option task">Task C</div>
    </div>
  </div>

</div>

<script>
  const grid = document.getElementById("grid");
  let selectedBox = null;

  // CREATE GRID
  for (let i = 1; i <= 30; i++) {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <div class="name">Member ${i}</div>
      <div class="tags1"></div>
      <div class="tags2">Unassigned</div>
    `;

    box.addEventListener("click", () => {
      if (selectedBox) selectedBox.classList.remove("selected");
      selectedBox = box;
      box.classList.add("selected");
    });

    grid.appendChild(box);
  }

  // LOAD SHARED DATA
  async function loadSharedData() {
    try {
      const response = await fetch("https://raw.githubusercontent.com/Sylvryce/priconne_pull_rating_chart_ex/refs/heads/main/grid-app/data.json");
      const data = await response.json();

      const boxes = document.querySelectorAll(".box");

      data.forEach((item, index) => {
        if (!boxes[index]) return;

        boxes[index].querySelector(".name").textContent = item.name;
        boxes[index].querySelector(".tags1").textContent = item.workers;
        boxes[index].querySelector(".tags2").textContent = item.task;
      });

    } catch (err) {
      console.error(err);
    }
  }

  // WORKERS (MULTI)
  document.querySelectorAll(".worker").forEach(option => {
    option.addEventListener("click", () => {
      if (!selectedBox) return;

      const tagsDiv = selectedBox.querySelector(".tags1");
      const name = option.textContent;

      let current = tagsDiv.textContent.split(", ").filter(t => t);

      if (current.includes(name)) {
        current = current.filter(t => t !== name);
      } else {
        current.push(name);
      }

      tagsDiv.textContent = current.join(", ");
    });
  });

  // TASK (TOGGLE SINGLE)
  document.querySelectorAll(".task").forEach(option => {
    option.addEventListener("click", () => {
      if (!selectedBox) return;

      const taskDiv = selectedBox.querySelector(".tags2");
      const newTask = option.textContent;

      if (taskDiv.textContent === newTask) {
        taskDiv.textContent = "Unassigned";
      } else {
        taskDiv.textContent = newTask;
      }
    });
  });

  // INIT
  loadSharedData();
</script>

</body>
</html>
