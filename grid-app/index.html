<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      display: flex;
      gap: 20px;
    }

    /* LEFT SIDE (GRID) */
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      width: 70%;
    }

    .box {
      border: 2px solid #ccc;
      padding: 10px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #f9f9f9;
      cursor: pointer;
    }

    .box.selected {
      border-color: blue;
      background-color: #e6f0ff;
    }

    .name {
      font-weight: bold;
    }

    .tags1 {
      font-size: 12px;
      color: #555;
    }

    .tags2 {
      font-size: 12px;
      color: #999;
    }

    /* RIGHT SIDE (PANEL) */
    .panel {
      width: 30%;
      border-left: 2px solid #ccc;
      padding-left: 15px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel h3 {
      margin-bottom: 10px;
    }

    .option {
      padding: 5px;
      border: 1px solid #ccc;
      margin-bottom: 5px;
      cursor: pointer;
      background-color: #f0f0f0;
    }

    .option:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- RIGHT PANEL -->
<div class="panel">
  <div class="panel-section">
    <h3>Name Selection</h3>
    <div class="option">Alice</div>
    <div class="option">Bob</div>
    <div class="option">Charlie</div>
  </div>

  <div class="panel-section">
    <h3>Task Selection</h3>
    <div class="option">Task A</div>
    <div class="option">Task B</div>
    <div class="option">Task C</div>
  </div>
</div>

<script>
  const grid = document.getElementById("grid");
  let selectedBox = null;

  // CREATE GRID
  for (let i = 1; i <= 30; i++) {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <div class="name">Member ${i}</div>
      <div class="tags1"></div>
      <div class="tags2"></div>
    `;

    box.addEventListener("click", () => {
      if (selectedBox) {
        selectedBox.classList.remove("selected");
      }

      selectedBox = box;
      box.classList.add("selected");
    });

    grid.appendChild(box);
  }

  // NAME SELECTION
  const nameOptions = document.querySelectorAll(".panel-section:nth-child(1) .option");

  nameOptions.forEach(option => {
    option.addEventListener("click", () => {
      if (!selectedBox) return;

      const nameDiv = selectedBox.querySelector(".name");
      nameDiv.textContent = option.textContent;
    });
  });
</script>

</body>
</html>
