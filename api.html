<script>
const apiURL = "https://roboninon.win/api/v1/priconne/clan/489663?key=yEmk6fTXsyr4GOjEMwTM15Jt";
const CACHE_KEY = "clan_api_cache";
const CACHE_TIME_KEY = "clan_api_cache_time";
const ONE_HOUR = 60 * 60 * 1000;

async function loadData() {
  const now = Date.now();

  const cachedData = localStorage.getItem(CACHE_KEY);
  const cachedTime = localStorage.getItem(CACHE_TIME_KEY);

  // Use cache if within 1 hour
  if (cachedData && cachedTime && (now - cachedTime < ONE_HOUR)) {
    console.log("Using cached data");
    const data = JSON.parse(cachedData);
    displayData(data);
    return;
  }

  // Otherwise fetch new data
  console.log("Fetching new data from API...");
  try {
    const response = await fetch(apiURL);
    const data = await response.json();

    // Save to cache
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TIME_KEY, now);

    displayData(data);
  } catch (err) {
    console.error(err);
    document.getElementById("output").textContent = "Error: " + err;
  }
}

function displayData(data) {
  console.log("API DATA:", data);
  document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}

loadData();
</script>
