<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
      gap: 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      flex: 3;
    }

    .box {
      border: 2px solid #ccc;
      padding: 10px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #f9f9f9;
      cursor: pointer;
    }

    .box.selected {
      border-color: blue;
      background-color: #e6f0ff;
    }

    .name {
      font-weight: bold;
    }

    .tags1 {
      font-size: 12px;
      color: #555;
    }

    .tags2 {
      font-size: 12px;
      color: #999;
    }

    /* PANEL */
    .panel {
      flex: 1;
      border-left: 2px solid #ccc;
      padding-left: 15px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .option {
      padding: 5px;
      border: 1px solid #ccc;
      margin-bottom: 5px;
      cursor: pointer;
      background-color: #f0f0f0;
    }

    .option:hover {
      background-color: #ddd;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- PANEL -->
  <div class="panel">
    <div class="panel-section">
      <h3>Workers (Multi-select)</h3>
      <div class="option worker">Alice</div>
      <div class="option worker">Bob</div>
      <div class="option worker">Charlie</div>
    </div>

    <div class="panel-section">
      <h3>Task (Single)</h3>
      <div class="option task">Task A</div>
      <div class="option task">Task B</div>
      <div class="option task">Task C</div>
    </div>
  </div>

</div>

<script>
  const grid = document.getElementById("grid");
  let selectedBox = null;

  // CREATE GRID WITH STATIC NAMES
  for (let i = 1; i <= 30; i++) {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <div class="name">Member ${i}</div>
      <div class="tags1"></div>
      <div class="tags2"></div>
    `;

    box.addEventListener("click", () => {
      if (selectedBox) {
        selectedBox.classList.remove("selected");
      }

      selectedBox = box;
      box.classList.add("selected");
    });

    grid.appendChild(box);
  }

  // WORKERS (MULTI SELECT)
  const workerOptions = document.querySelectorAll(".worker");

  workerOptions.forEach(option => {
    option.addEventListener("click", () => {
      if (!selectedBox) return;

      const tagsDiv = selectedBox.querySelector(".tags1");
      const name = option.textContent;

      let current = tagsDiv.textContent.split(", ").filter(t => t);

      if (current.includes(name)) {
        current = current.filter(t => t !== name);
      } else {
        current.push(name);
      }

      tagsDiv.textContent = current.join(", ");
    });
  });

  // TASK (SINGLE SELECT)
  const taskOptions = document.querySelectorAll(".task");

  taskOptions.forEach(option => {
    option.addEventListener("click", () => {
      if (!selectedBox) return;

      const taskDiv = selectedBox.querySelector(".tags2");
      taskDiv.textContent = option.textContent;
    });
  });
</script>

</body>
</html>
