<script>
const apiURL = "https://roboninon.win/api/v1/priconne/clan/489663?key=yEmk6fTXsyr4GOjEMwTM15Jt";

// Get member index from URL
const params = new URLSearchParams(window.location.search);
const memberIndex = parseInt(params.get("member")) || 1;

async function loadData() {
  console.log("Fetching data from API...");

  try {
    const response = await fetch(apiURL);
    const data = await response.json();

    console.log("FULL API:", data);

    const members = data;

    displayMember(members);

  } catch (err) {
    console.error(err);

    const output = document.getElementById("output");
    if (output) {
      output.textContent = "Error fetching API";
    }
  }
}

function displayMember(members) {
  const output = document.getElementById("output");

  if (!output) return;

  const member = members[memberIndex - 1];

  if (!member) {
    output.textContent = "Invalid member index";
    return;
  }

  output.textContent = JSON.stringify(member, null, 2);
}

loadData();
</script>
